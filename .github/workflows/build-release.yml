name: Build Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: true
        type: boolean

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        packages: 'platform-tools platforms;android-33 build-tools;33.0.2'
    
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v2
    
    - name: Generate version info
      id: version
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION=${{ github.event.inputs.version }}
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "version_code=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION (code: $(date +%Y%m%d))"
    
    - name: Update version in build.gradle
      run: |
        sed -i "s/versionCode = 1/versionCode = ${{ steps.version.outputs.version_code }}/g" app/build.gradle.kts
        sed -i "s/versionName = \"1.0\"/versionName = \"${{ steps.version.outputs.version }}\"/g" app/build.gradle.kts
    
    - name: Clean and Build Release APK
      run: |
        ./gradlew clean
        ./gradlew assembleRelease --stacktrace
      env:
        CI: true
        ANDROID_KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_PATH }}
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    
    - name: List generated APKs
      run: |
        echo "=== Generated Release APKs ==="
        find app/build/outputs/apk/release -name "*.apk" -type f -exec ls -lh {} \;
        echo ""
        echo "=== APK Details ==="
        for apk in app/build/outputs/apk/release/*.apk; do
          echo "File: $apk"
          echo "Size: $(stat -c%s "$apk" | numfmt --to=iec-i)"
          echo "---"
        done
    
    - name: Rename APKs with version
      run: |
        VERSION=${{ steps.version.outputs.version }}
        mkdir -p release-apks
        for apk in app/build/outputs/apk/release/*.apk; do
          # Extract architecture from filename
          if [[ $apk == *"arm64-v8a"* ]]; then
            ARCH="arm64-v8a"
          elif [[ $apk == *"armeabi-v7a"* ]]; then
            ARCH="armeabi-v7a"
          else
            ARCH="universal"
          fi
          
          newname="FFAI-Assistant-v${VERSION}-${ARCH}.apk"
          cp "$apk" "release-apks/$newname"
          echo "Renamed: $apk -> $newname"
        done
    
    - name: Generate changelog
      id: changelog
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            echo "Changes since $LAST_TAG:"
            git log --pretty=format:"- %s" $LAST_TAG..HEAD
          else
            echo "First release"
            git log --pretty=format:"- %s" | head -20
          fi
        else
          echo "Manual release build"
        fi
    
    - name: Upload Release APKs
      uses: actions/upload-artifact@v4
      with:
        name: ffai-assistant-release-${{ steps.version.outputs.version }}
        path: release-apks/*.apk
        retention-days: 90
    
    - name: Create GitHub Release
      if: github.event_name == 'push' || github.event.inputs.create_release == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: FFAI Assistant ${{ steps.version.outputs.version }}
        body: |
          ## FFAI Assistant ${{ steps.version.outputs.version }}
          
          **IA 100% Local para Free Fire - Optimizado para Samsung A21S**
          
          ### Downloads
          - **arm64-v8a** (Samsung A21S): Descargar `FFAI-Assistant-v${{ steps.version.outputs.version }}-arm64-v8a.apk`
          - **armeabi-v7a** (Dispositivos antiguos): Descargar `FFAI-Assistant-v${{ steps.version.outputs.version }}-armeabi-v7a.apk`
          
          ### Características
          - Ensemble de 8 modelos TFLite especializados
          - Ejecución 100% offline (sin Google Play Services)
          - Optimizado para dispositivos de gama media (4GB RAM)
          - Motor de decisión avanzado con RL
          
          ### Cambios
          ${{ steps.changelog.outputs.changelog }}
        files: release-apks/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Report Build Status
      if: always()
      run: |
        echo "================================"
        echo "Build completed: ${{ job.status }}"
        echo "Version: ${{ steps.version.outputs.version }}"
        echo "Version Code: ${{ steps.version.outputs.version_code }}"
        echo "================================"
