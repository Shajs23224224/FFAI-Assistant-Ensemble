name: Build APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      id: setup-java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: none

    - name: Verify Java Version
      run: |
        echo "JAVA_HOME: $JAVA_HOME"
        java -version
        which java

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

    - name: Verify Android SDK
      run: |
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "SDK contents:"
        ls -la $ANDROID_HOME 2>/dev/null || echo "ANDROID_HOME not set"

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v2

    - name: Diagnostic - Project Structure
      run: |
        echo "Project files:"
        ls -la
        echo "---"
        echo "App build.gradle.kts exists:"
        test -f app/build.gradle.kts && echo "YES" || echo "NO"
        echo "---"
        echo "Settings.gradle.kts:"
        cat settings.gradle.kts
    
    - name: Clean and Build Debug APK
      if: github.event.inputs.build_type != 'release'
      run: |
        echo "Using JAVA_HOME: $JAVA_HOME"
        java -version
        ./gradlew clean
        ./gradlew assembleDebug --stacktrace
      env:
        CI: true

    - name: Clean and Build Release APK
      if: github.event.inputs.build_type == 'release'
      run: |
        echo "Using JAVA_HOME: $JAVA_HOME"
        java -version
        ./gradlew clean
        ./gradlew assembleRelease --stacktrace
      env:
        CI: true
        ANDROID_KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_PATH }}
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    
    - name: Get APK info
      id: apk_info
      run: |
        # List all generated APKs
        echo "=== Generated APKs ==="
        find app/build/outputs/apk -name "*.apk" -type f 2>/dev/null || echo "No APK directory yet"
        
        # Determine build type and search path
        if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
          APK_DIR="app/build/outputs/apk/release"
        else
          APK_DIR="app/build/outputs/apk/debug"
        fi
        
        # Get primary APK (arm64-v8a for A21S, or first available)
        APK_PATH=$(find "$APK_DIR" -name "*.apk" -type f 2>/dev/null | head -1)
        
        if [ -z "$APK_PATH" ]; then
          echo "WARNING: No APK found in $APK_DIR"
          echo "Listing directory contents:"
          ls -la "$APK_DIR" 2>/dev/null || echo "Directory does not exist"
          # Don't fail - artifacts step will handle it
          echo "apk_path=" >> $GITHUB_OUTPUT
          echo "apk_size=0" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        APK_SIZE=$(stat -c%s "$APK_PATH")
        echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
        echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
        echo "APK: $APK_PATH"
        echo "Size: $((APK_SIZE / 1024 / 1024 )) MB"
        
        # Check if APK is under 100MB GitHub limit
        if [ $APK_SIZE -gt 104857600 ]; then
          echo "WARNING: APK exceeds 100MB GitHub limit"
        fi
    
    - name: Verify APKs exist
      run: |
        echo "=== Verifying APK files ==="
        if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
          APK_DIR="app/build/outputs/apk/release"
        else
          APK_DIR="app/build/outputs/apk/debug"
        fi
        
        echo "Checking directory: $APK_DIR"
        ls -la "$APK_DIR" 2>/dev/null || echo "Directory structure:"
        find app/build/outputs/apk -type d 2>/dev/null
        
        APK_COUNT=$(find "$APK_DIR" -name "*.apk" -type f 2>/dev/null | wc -l)
        echo "Found $APK_COUNT APK files"
        
        if [ "$APK_COUNT" -eq 0 ]; then
          echo "ERROR: No APK files found!"
          exit 1
        fi
    
    - name: Upload Debug APKs
      if: github.event.inputs.build_type != 'release'
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ github.run_number }}
        path: |
          app/build/outputs/apk/debug/*/*.apk
          app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
        retention-days: 30
    
    - name: Upload Release APKs
      if: github.event.inputs.build_type == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: app-release-${{ github.run_number }}
        path: |
          app/build/outputs/apk/release/*/*.apk
          app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
        retention-days: 30
    
    - name: Analyze APK
      run: |
        if command -v aapt &> /dev/null; then
          echo "=== APK Contents ==="
          unzip -l ${{ steps.apk_info.outputs.apk_path }} | tail -20
          
          echo "=== Native Libraries ==="
          unzip -l ${{ steps.apk_info.outputs.apk_path }} | grep "\.so" || echo "No native libs found"
        fi
    
    - name: Report Build Status
      if: always()
      run: |
        echo "================================"
        echo "Build completed with status: ${{ job.status }}"
        echo "APK Path: ${{ steps.apk_info.outputs.apk_path }}"
        APK_SIZE="${{ steps.apk_info.outputs.apk_size }}"
        if [ -n "$APK_SIZE" ] && [ "$APK_SIZE" -gt 0 ]; then
          echo "APK Size: $(( APK_SIZE / 1024 / 1024 )) MB"
        else
          echo "APK Size: N/A (build may have failed)"
        fi
        echo "================================"
